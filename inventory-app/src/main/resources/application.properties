# Application name and server port
spring.application.name=inventory-app
server.port=8080

# 
# =================================
# JPA Configuration (for compatibility/migrations if needed)
# =================================
spring.datasource.url=jdbc:sqlserver://LAPTOP-01D16H7T\\SQLEXPRESS;databaseName=inventory_DB;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate/JPA config for SQL Server
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =================================
# WebFlux Configuration - CORRECTED
# =================================
# Removed spring.webflux.base-path as it's not a standard property
# spring.webflux.base-path=/api  # This property doesn't exist

# Static resources configuration
spring.web.resources.static-locations=classpath:/static/
spring.webflux.static-path-pattern=/**

# Reactive server configuration
server.netty.connection-timeout=60s
server.netty.h2c-max-content-length=10MB

# =================================
# Multipart and File Upload (WebFlux style)
# =================================
spring.webflux.multipart.max-in-memory-size=1MB
spring.webflux.multipart.max-disk-usage-per-part=10MB
spring.webflux.multipart.max-parts=128

# =================================
# Logging Configuration - CORRECTED
# =================================
logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc.mssql=INFO
logging.level.ma.scs.inventory_app=DEBUG
logging.level.reactor.netty.http.client=INFO
logging.level.org.hibernate.SQL=INFO
# Fixed: Removed invalid asterisks in logger pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =================================
# DevTools Configuration
# =================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**

# =================================
# Management and Actuator
# =================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
# Removed non-existent r2dbc actuator endpoint
# management.health.r2dbc.enabled=true

# =================================
# Error Handling
# =================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=false

# =================================
# CORS Configuration (for your dashboard frontend)
# =================================
spring.webflux.cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://127.0.0.1:5500
spring.webflux.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.webflux.cors.allowed-headers=*
spring.webflux.cors.allow-credentials=true

# =================================
# Custom Application Properties
# =================================
# Dashboard refresh interval (seconds)
app.dashboard.refresh-interval=30
app.dashboard.max-connections=100

# Inventory thresholds
app.inventory.low-stock-threshold=10
app.inventory.critical-stock-threshold=5

# Cache configuration
app.cache.ttl=300
app.cache.max-entries=1000

# =================================
# Performance Tuning
# =================================
# Reactor Netty configuration
reactor.netty.http.server.accesslog.enabled=false
reactor.netty.pool.leasingStrategy=lifo

# WebFlux buffer sizes
spring.webflux.multipart.streaming=true

# =================================
# Database Connection Validation
# =================================
# R2DBC connection validation
spring.r2dbc.pool.validation-query=SELECT 1